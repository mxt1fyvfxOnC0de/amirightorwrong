<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Am I Right?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.25);
    --glass-shadow: rgba(0,0,0,0.25);
    --blur: 28px;
    --accent: #0a84ff;
    --accent2: #30d158;
    --wrong: #ff453a;
    --text: rgba(255,255,255,0.95);
    --text-dim: rgba(255,255,255,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #000;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: default;
  }

  /* Cursor glow that follows mouse */
  body::after {
    content: '';
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(10,132,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    left: var(--mx, -999px);
    top: var(--my, -999px);
    transition: left 0.06s ease, top 0.06s ease;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 30%, #1a2a6c 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 80% 70%, #16213e 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, #0f3460 0%, transparent 70%),
                #050a1a;
  }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.55; z-index: 0;
    animation: drift linear infinite;
    transition: opacity 0.5s ease, filter 0.5s ease;
  }
  .orb:hover { opacity: 0.85; filter: blur(60px); }
  .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, #0a84ff55, transparent 70%); top: -100px; left: -100px; animation-duration: 18s; }
  .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, #5e5ce655, transparent 70%); bottom: -80px; right: -80px; animation-duration: 22s; animation-direction: reverse; }
  .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, #30d15833, transparent 70%); top: 50%; left: 60%; animation-duration: 15s; }

  @keyframes drift {
    0%   { transform: translate(0,0) rotate(0deg); }
    33%  { transform: translate(40px,-30px) rotate(120deg); }
    66%  { transform: translate(-20px,40px) rotate(240deg); }
    100% { transform: translate(0,0) rotate(360deg); }
  }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 560px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    backdrop-filter: blur(var(--blur)) saturate(180%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
    box-shadow: 0 30px 80px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.3);
    padding: 44px 40px 40px;
    transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.4s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.008);
    box-shadow: 0 55px 130px rgba(0,0,0,0.45), 0 0 80px rgba(10,132,255,0.1), inset 0 1px 0 rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.38);
    background: rgba(255,255,255,0.15);
  }

  /* ── LOGO ROW ── */
  .logo-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    cursor: pointer;
    width: fit-content;
  }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: linear-gradient(135deg, #0a84ff, #5e5ce6);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(10,132,255,0.45);
    font-size: 22px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease, border-radius 0.35s ease, background 0.3s ease;
  }
  .logo-row:hover .logo-icon {
    transform: rotate(-10deg) scale(1.18);
    box-shadow: 0 14px 40px rgba(10,132,255,0.7);
    border-radius: 20px;
    background: linear-gradient(135deg, #1a8fff, #7e7cf0);
  }
  h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
    transition: letter-spacing 0.3s ease, color 0.3s ease;
  }
  .logo-row:hover h1 { letter-spacing: 0.1px; }
  h1 span {
    color: var(--accent);
    display: inline-block;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), text-shadow 0.3s ease;
  }
  .logo-row:hover h1 span {
    text-shadow: 0 0 24px rgba(10,132,255,0.7);
    transform: scale(1.06);
  }

  /* ── SUBTITLE ── */
  .subtitle {
    font-size: 14px; color: var(--text-dim); margin-top: 4px; margin-bottom: 28px;
    font-weight: 400; letter-spacing: 0.1px;
    transition: color 0.3s ease, letter-spacing 0.3s ease;
    cursor: default;
  }
  .subtitle:hover { color: rgba(255,255,255,0.82); letter-spacing: 0.3px; }

  /* ── LABELS ── */
  label {
    display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
    cursor: default;
    transition: color 0.25s ease, letter-spacing 0.3s ease;
  }
  label:hover { color: rgba(255,255,255,0.85); letter-spacing: 1.2px; }

  /* ── TEXTAREAS ── */
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    color: var(--text);
    font-size: 16px; font-family: inherit;
    padding: 18px 20px;
    resize: none;
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease, transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: text;
  }
  textarea::placeholder { color: rgba(255,255,255,0.3); transition: color 0.3s ease, letter-spacing 0.3s ease; }
  textarea:hover {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  textarea:hover::placeholder { color: rgba(255,255,255,0.5); letter-spacing: 0.2px; }
  textarea:focus {
    border-color: rgba(10,132,255,0.65);
    background: rgba(255,255,255,0.11);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.2), 0 10px 28px rgba(0,0,0,0.25);
    transform: translateY(-2px);
  }
  #claim { height: 100px; }
  #reasoning { height: 120px; }

  /* ── BUTTONS ── */
  .btn {
    width: 100%; margin-top: 18px; padding: 17px;
    border: none; border-radius: 18px; cursor: pointer;
    font-size: 17px; font-weight: 600; letter-spacing: -0.2px;
    font-family: inherit;
    transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.25s ease, letter-spacing 0.25s ease, background 0.25s ease;
    position: relative; overflow: hidden;
  }
  /* Shimmer sweep */
  .btn::before {
    content: '';
    position: absolute; top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transition: left 0.55s ease;
    pointer-events: none;
  }
  .btn:hover::before { left: 160%; }

  .btn-primary {
    background: linear-gradient(135deg, #0a84ff, #5e5ce6);
    color: #fff;
    box-shadow: 0 8px 32px rgba(10,132,255,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-4px) scale(1.015);
    box-shadow: 0 18px 52px rgba(10,132,255,0.65), 0 0 40px rgba(94,92,230,0.35);
    background: linear-gradient(135deg, #1e8fff, #706ef0);
    letter-spacing: 0.2px;
  }
  .btn-primary:active { transform: translateY(0) scale(0.98); box-shadow: 0 4px 16px rgba(10,132,255,0.3); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary:disabled:hover { transform: none; box-shadow: 0 8px 32px rgba(10,132,255,0.4); }

  /* ── STEP DOTS ── */
  .step-indicator {
    display: flex; gap: 8px; align-items: center; margin-bottom: 22px;
  }
  .step {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    cursor: pointer;
  }
  .step:hover { background: rgba(255,255,255,0.55); transform: scale(1.5); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
  .step.active { background: var(--accent); box-shadow: 0 0 10px rgba(10,132,255,0.6); width: 24px; border-radius: 4px; }
  .step.active:hover { box-shadow: 0 0 22px rgba(10,132,255,1); transform: scaleY(1.4) scaleX(1.05); }
  .step.done { background: var(--accent2); border-radius: 50%; width: 8px; }
  .step.done:hover { box-shadow: 0 0 16px rgba(48,209,88,0.8); transform: scale(1.5); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;
    transition: background 0.3s ease, height 0.3s ease;
    cursor: default;
  }
  .divider:hover { background: rgba(255,255,255,0.28); height: 2px; }

  /* ── REASONING PANEL ── */
  .reasoning-panel {
    overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease, margin 0.4s ease;
    margin-top: 0;
  }
  .reasoning-panel.open { max-height: 400px; opacity: 1; margin-top: 22px; }

  /* ── RESULT OVERLAY ── */
  .result-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .result-overlay.show { opacity: 1; pointer-events: all; }
  .result-overlay.right-bg { background: rgba(0,20,0,0.72); }
  .result-overlay.wrong-bg { background: rgba(30,0,0,0.72); }

  /* ── RESULT CARD ── */
  .result-card {
    position: relative;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 36px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    padding: 52px 44px 44px;
    max-width: 460px; width: 100%; text-align: center;
    transform: scale(0.85) translateY(30px);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .result-overlay.show .result-card { transform: scale(1) translateY(0); }
  .result-card:hover {
    box-shadow: 0 65px 150px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.35);
    transform: scale(1.015) translateY(-3px);
    background: rgba(255,255,255,0.14);
  }

  /* ── VERDICT ICON ── */
  .verdict-icon {
    font-size: 72px; line-height: 1; margin-bottom: 20px; display: block;
    animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease;
    cursor: default;
  }
  .verdict-icon:hover { transform: scale(1.25) rotate(8deg); filter: drop-shadow(0 0 24px rgba(255,255,255,0.5)); }

  @keyframes pop {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── VERDICT LABEL ── */
  .verdict-label {
    font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 14px;
    background: linear-gradient(135deg, currentColor, rgba(255,255,255,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    transition: letter-spacing 0.3s ease, filter 0.3s ease;
    cursor: default;
  }
  .verdict-label:hover { letter-spacing: -0.5px; filter: brightness(1.2) drop-shadow(0 0 14px currentColor); }
  .verdict-label.right { color: var(--accent2); }
  .verdict-label.wrong { color: var(--wrong); }

  /* ── VERDICT EXPLAIN ── */
  .verdict-explain {
    font-size: 16px; line-height: 1.65; color: rgba(255,255,255,0.75);
    margin-bottom: 32px; font-weight: 400;
    transition: color 0.3s ease, transform 0.3s ease;
    cursor: default;
  }
  .verdict-explain:hover { color: rgba(255,255,255,0.98); transform: scale(1.01); }

  /* ── TRY AGAIN BUTTON ── */
  .btn-again {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
    border-radius: 14px; padding: 14px 32px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: all 0.28s cubic-bezier(0.34,1.2,0.64,1);
    position: relative; overflow: hidden;
  }
  .btn-again::before {
    content: '';
    position: absolute; top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
    transition: left 0.55s ease; pointer-events: none;
  }
  .btn-again:hover {
    background: rgba(255,255,255,0.24);
    border-color: rgba(255,255,255,0.45);
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 14px 36px rgba(0,0,0,0.35);
    letter-spacing: 0.3px;
  }
  .btn-again:hover::before { left: 160%; }
  .btn-again:active { transform: translateY(0) scale(0.97); }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 22px; height: 22px;
    border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo-row">
    <div class="logo-icon">⚖️</div>
    <div>
      <h1>Am I <span>Right</span>?</h1>
    </div>
  </div>
  <p class="subtitle">State your claim. Share your reasoning. Get the verdict.</p>

  <div class="step-indicator">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <label for="claim">Your Claim</label>
  <textarea id="claim" placeholder="e.g. Pineapple belongs on pizza…"></textarea>

  <button class="btn btn-primary" id="submitClaim">Submit Claim →</button>

  <div class="reasoning-panel" id="reasoningPanel">
    <div class="divider"></div>
    <label for="reasoning">Your Reasoning <span style="opacity:0.4;font-weight:400;text-transform:none;letter-spacing:0">(explain why you're right)</span></label>
    <textarea id="reasoning" placeholder="Walk me through your thinking…"></textarea>
    <button class="btn btn-primary" id="submitReasoning" style="margin-top:16px">Judge Me ⚡</button>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="verdict-icon" id="verdictIcon"></span>
    <div class="verdict-label" id="verdictLabel"></div>
    <p class="verdict-explain" id="verdictExplain"></p>
    <button class="btn-again" id="tryAgain">Try Another Claim</button>
  </div>
</div>

<script>
  // Mouse-tracking cursor glow
  document.addEventListener('mousemove', e => {
    document.body.style.setProperty('--mx', e.clientX + 'px');
    document.body.style.setProperty('--my', e.clientY + 'px');
  });

  const claimEl       = document.getElementById('claim');
  const reasoningEl   = document.getElementById('reasoning');
  const submitClaim   = document.getElementById('submitClaim');
  const submitReason  = document.getElementById('submitReasoning');
  const reasonPanel   = document.getElementById('reasoningPanel');
  const resultOverlay = document.getElementById('resultOverlay');
  const verdictIcon   = document.getElementById('verdictIcon');
  const verdictLabel  = document.getElementById('verdictLabel');
  const verdictExpl   = document.getElementById('verdictExplain');
  const tryAgain      = document.getElementById('tryAgain');
  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');

  function flashError(el) {
    el.style.borderColor = 'rgba(255,69,58,0.75)';
    el.style.boxShadow   = '0 0 0 3px rgba(255,69,58,0.22)';
    el.focus();
    setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1300);
  }

  submitClaim.addEventListener('click', () => {
    if (!claimEl.value.trim()) { flashError(claimEl); return; }
    reasonPanel.classList.add('open');
    s1.classList.replace('active','done');
    s2.classList.add('active');
    reasoningEl.focus();
    submitClaim.textContent = '✓ Claim Locked';
    submitClaim.disabled = true;
  });

  submitReason.addEventListener('click', async () => {
    if (!reasoningEl.value.trim()) { flashError(reasoningEl); return; }
    submitReason.disabled = true;
    submitReason.innerHTML = '<span class="spinner"></span>Consulting the judge…';
    s2.classList.replace('active','done');
    s3.classList.add('active');

    try {
      const prompt = `You are a sharp, witty, and impartial judge. A user has made a claim and provided reasoning. You must decide: are they RIGHT or WRONG?

CLAIM: "${claimEl.value.trim()}"
REASONING: "${reasoningEl.value.trim()}"

Respond ONLY with a valid JSON object (no markdown, no backticks) like:
{"verdict":"RIGHT","explanation":"2-3 sentence punchy explanation of why they are right or wrong. Be direct, clever, and a little entertaining."}

If the claim is genuinely subjective or opinion-based, judge based on the strength and logic of their reasoning alone.`;

      const res  = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data   = await res.json();
      const raw    = data.content.map(b => b.text || '').join('');
      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      showResult(parsed.verdict, parsed.explanation);
    } catch {
      const score = scoreLocal(reasoningEl.value.toLowerCase());
      showResult(score > 0.5 ? 'RIGHT' : 'WRONG', score > 0.5
        ? "Your reasoning holds up — the logic is sound and the argument is well-constructed."
        : "The reasoning has some gaps. A stronger argument is needed to back this claim.");
    }
  });

  function scoreLocal(r) {
    let s = 0.5;
    ['because','therefore','evidence','study','research','data','proven','fact','science','statistically','historically','logically','demonstrates','shows']
      .forEach(w => r.includes(w) && (s += 0.06));
    ['i think','i feel','i believe','everyone knows','obviously','clearly','just','trust me']
      .forEach(w => r.includes(w) && (s -= 0.07));
    if (r.length > 150) s += 0.08;
    if (r.length < 30)  s -= 0.12;
    return Math.max(0.05, Math.min(0.95, s));
  }

  function showResult(verdict, explanation) {
    const ok = verdict.toUpperCase() === 'RIGHT';
    verdictIcon.textContent  = ok ? '✅' : '❌';
    verdictLabel.textContent = ok ? "YOU'RE RIGHT" : "YOU'RE WRONG";
    verdictLabel.className   = 'verdict-label ' + (ok ? 'right' : 'wrong');
    verdictExpl.textContent  = explanation;
    resultOverlay.className  = 'result-overlay show ' + (ok ? 'right-bg' : 'wrong-bg');
  }

  tryAgain.addEventListener('click', () => {
    resultOverlay.className = 'result-overlay';
    claimEl.value = ''; reasoningEl.value = '';
    reasonPanel.classList.remove('open');
    submitClaim.textContent  = 'Submit Claim →'; submitClaim.disabled  = false;
    submitReason.textContent = 'Judge Me ⚡';    submitReason.disabled = false;
    s1.className = 'step active'; s2.className = 'step'; s3.className = 'step';
    claimEl.focus();
  });
</script>
</body>
</html>
